# threestudio 配置文件 - 文本到 3D 生成
# 使用 Stable Diffusion + SDS Loss + NeRF

name: "text-to-3d-sds"
tag: "${rmspace:${system.prompt_processor.prompt},_}"
exp_root_dir: "output"
seed: 0

data_type: "random-camera-datamodule"
data:
  batch_size: 1
  width: 64
  height: 64
  camera_distance_range: [1.0, 1.5]
  fovy_range: [40, 70]
  elevation_range: [-10, 45]
  azimuth_range: [-180, 180]
  batch_uniform_azimuth: true
  eval_camera_distance: 1.5
  eval_fovy_deg: 70.0

system_type: "dreamfusion-system"
system:
  geometry_type: "implicit-volume"
  geometry:
    radius: 1.0
    normal_type: analytic
    density_bias: "blob_magic3d"
    density_activation: softplus
    density_blob_scale: 10.0
    density_blob_std: 0.5
    pos_encoding_config:
      otype: HashGrid
      n_levels: 16
      n_features_per_level: 2
      log2_hashmap_size: 19
      base_resolution: 16
      per_level_scale: 1.447269237440378

  material_type: "no-material"
  material:
    n_output_dims: 3
    color_activation: sigmoid

  background_type: "neural-environment-map-background"
  background:
    color_activation: sigmoid
    random_aug: true

  renderer_type: "nerf-volume-renderer"
  renderer:
    radius: ${system.geometry.radius}
    num_samples_per_ray: 512

  prompt_processor_type: "stable-diffusion-prompt-processor"
  prompt_processor:
    pretrained_model_name_or_path: "Manojb/stable-diffusion-2-1-base"
    prompt: "a high quality 3D render of a cute baby dragon, white background"
    negative_prompt: "ugly, bad anatomy, poorly drawn, low quality"

  guidance_type: "stable-diffusion-guidance"
  guidance:
    pretrained_model_name_or_path: "Manojb/stable-diffusion-2-1-base"
    guidance_scale: 100.0
    weighting_strategy: sds
    min_step_percent: 0.02
    max_step_percent: 0.98

  loggers:
    wandb:
      enable: false
      project: "threestudio"
      name: "text-to-3d"

  loss:
    lambda_sds: 1.0
    lambda_orient: 0.0
    lambda_sparsity: 10.0
    lambda_opaque: 10.0

  optimizer:
    name: Adam
    args:
      lr: 0.01
      betas: [0.9, 0.99]
      eps: 1.e-15

trainer:
  max_steps: 10000
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  val_check_interval: 200
  enable_progress_bar: true
  precision: 16-mixed

checkpoint:
  save_last: true
  save_top_k: -1
  every_n_train_steps: ${trainer.max_steps}
